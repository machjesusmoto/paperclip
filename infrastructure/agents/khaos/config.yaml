# TAYA Agent config — Khaos (Jayme's Personal Assistant)
# ============================================================
# Baked into image at /opt/data/agent-config/config.yaml
# Runtime overrides (NOT in this file):
#   OPENROUTER_API_KEY    per-agent OR key (Vault → .env-keys)
#   API_SERVER_KEY        gateway auth
#   WHATSAPP_*            WhatsApp bridge creds
#   PAPERCLIP_API_URL     host-dep, set in x-agent-common
# ============================================================
#
# NOTE: This is Khaos's FULL config (590 lines) — every section from the
# host-side config is baked in. Only secrets (OR key, API_SERVER_KEY,
# WhatsApp tokens, Open Brain key, vault ssh key) are injected at runtime.
# State stays on host bind mount, baked config is the immutable source.

model:
  default: minimax/minimax-m3
  provider: openrouter
  base_url: https://openrouter.ai/api/v1
  api_mode: chat_completions

providers: {}
fallback_providers: []
credential_pool_strategies: {}
toolsets:
- hermes-cli
max_concurrent_sessions: null

agent:
